name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Capacitor CLI & Android
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Build web assets
        run: npm run build

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant Gradle execute permission
        run: chmod +x android/gradlew

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Fix Kotlin stdlib duplicate classes
        run: |
          # 在 android/app/build.gradle 添加依赖解析策略，强制统一 kotlin-stdlib 版本
          cat >> android/app/build.gradle << 'EOF'

          configurations.all {
              resolutionStrategy {
                  force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
                  force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22'
                  force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'
              }
          }
          EOF

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: zhougong-jiemeng-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "周公解梦 v${{ github.run_number }}"
          body: |
            🔮 周公解梦 APP - 自动构建版本
            
            **功能包含：**
            - 传统分类浏览：动物、人物、自然、物品、行为、情感、鬼神、建筑、植物、食物
            - 关键词搜索与梦境详情
            - 基于本地关键词匹配的智能推荐
            - 最近搜索历史、收藏夹、结果分享
            - 古典中式 UI，适配移动端
          files: android/app/build/outputs/apk/debug/app-debug.apk
          token: ${{ secrets.GITHUB_TOKEN }}
